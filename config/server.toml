# [server] es informativo: el host/port real vive en scripts/start.sh / start.bat
[server]
host = "0.0.0.0"
port = 7779
reload = true

# Ruta relativa a la raíz de Aurora. Funciona igual en Linux y Windows.
# Override puntual: variable de entorno AURORA_DB_PATH.
[db]
path = "databases/aihub.db"

# CORS se configura en src/main.py (allowlist de orígenes locales + extensión).
